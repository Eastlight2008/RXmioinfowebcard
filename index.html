<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo RXBreach Mio服 — 服务器状态</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #e8e8e8;
            --text-secondary: #a0a0b0;
            --accent: #6ec6ff;
            --radius: 18px;
            --blur-amount: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background: #0a0a14;
        }

        /* ── Background Layer ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(12px) brightness(0.35);
            transform: scale(1.05);
        }
        .bg-placeholder {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1030 30%, #0d1b2a 60%, #0a0a14 100%);
        }

        /* ── Header ── */
        .header {
            margin-top: 40px;
            margin-bottom: 12px;
            text-align: center;
            padding: 24px 48px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #c0d8ff, #8eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .header .refresh-info {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #707088;
        }
        .header .refresh-info span {
            color: var(--accent);
            font-weight: 600;
        }

        /* ── Status Bar ── */
        .status-bar {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: 14px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .status-bar strong {
            color: var(--text);
        }
        .status-bar .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }
        .dot.warn {
            background: #ff9800;
            box-shadow: 0 0 8px #ff9800;
        }
        .dot.idle {
            background: #9e9e9e;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            padding: 10px 24px 40px;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 20px 22px;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .card.phase-round::before    { background: linear-gradient(90deg, #4caf50, #81c784); }
        .card.phase-nuke::before     { background: linear-gradient(90deg, #f44336, #e57373); }
        .card.phase-ready::before    { background: linear-gradient(90deg, #ff9800, #ffb74d); }
        .card.phase-idle::before     { background: linear-gradient(90deg, #757575, #9e9e9e); }
        .card.phase-unknown::before  { background: linear-gradient(90deg, #607d8b, #90a4ae); }

        .card .name {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
            padding-top: 4px;
        }
        .card .addr {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 10px;
            border-radius: 8px;
            word-break: break-all;
        }
        .card .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .card .label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .card .value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .card .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .badge-round  { background: rgba(76,  175, 80,  0.2);  color: #81c784; }
        .badge-nuke   { background: rgba(244, 67,  54,  0.2);  color: #e57373; }
        .badge-ready  { background: rgba(255, 152, 0,   0.2);  color: #ffb74d; }
        .badge-idle   { background: rgba(158, 158, 158, 0.2);  color: #bdbdbd; }
        .badge-unknown{ background: rgba(96,  125, 139, 0.2);  color: #90a4ae; }

        .card .a2s-row {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 10px;
            margin-top: 2px;
        }
        .card .a2s-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .card .a2s-loading {
            color: #707088;
            font-size: 0.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .card .a2s-error {
            color: #e57373;
            font-size: 0.75rem;
        }
        .card .a2s-latency-good { color: #81c784; }
        .card .a2s-latency-ok   { color: #ffb74d; }
        .card .a2s-latency-bad  { color: #e57373; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        .card .time-info {
            font-size: 0.72rem;
            color: #606078;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Loading / Error ── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            margin: 60px auto;
            background: rgba(244, 67, 54, 0.12);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: var(--radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
        }
        .error-box h3 {
            color: #e57373;
            margin-bottom: 8px;
        }
        .error-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer {
            padding: 16px;
            font-size: 0.7rem;
            color: #505068;
            text-align: center;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .header {
                margin-top: 20px;
                padding: 18px 24px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 8px 12px 30px;
            }
            .status-bar {
                gap: 12px;
                padding: 10px 18px;
                font-size: 0.75rem;
            }
        }
        @media (max-width: 480px) {
            .header {
                margin-top: 12px;
                padding: 14px 16px;
                border-radius: 12px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .header .subtitle {
                font-size: 0.75rem;
            }
            .card {
                padding: 14px 16px;
                gap: 8px;
                border-radius: 14px;
            }
            .card .name {
                font-size: 0.85rem;
            }
            .card .value {
                font-size: 1rem;
            }
            .status-bar {
                gap: 6px;
                padding: 8px 12px;
                font-size: 0.7rem;
                border-radius: 10px;
            }
            .grid {
                gap: 10px;
                padding: 6px 8px 24px;
            }
        }
    </style>
</head>
<body>

<div class="bg-placeholder"></div>
<div class="bg-layer" id="bgLayer"></div>

<div class="header">
    <h1>Neo RXBreach Mio服</h1>
    <div class="subtitle">mio 服集群 — 实时服务器状态</div>
    <div class="refresh-info">
        自动刷新: <span id="countdown">10</span>s
    </div>
</div>

<div class="status-bar" id="statusBar">
    <div class="loading">
        <div class="spinner"></div>
        <span style="color:#a0a0b0">正在获取服务器数据...</span>
    </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
    Powered by <a href="https://dp.nigigasaki.live/status.php" target="_blank" rel="noopener">dp.nigigasaki.live</a>
    &nbsp;·&nbsp;
    Background by <a href="https://api.yppp.net/api.php" target="_blank" rel="noopener">yppp.net</a>
</div>

<script>
(function () {
    'use strict';

    const STAT_API = 'https://dp.nigigasaki.live/status.php';
    const REFRESH_INTERVAL = 10; // seconds

    const $bgLayer   = document.getElementById('bgLayer');
    const $statusBar = document.getElementById('statusBar');
    const $grid      = document.getElementById('grid');
    const $countdown = document.getElementById('countdown');

    let refreshTimer   = null;
    let countdownTimer = null;
    let countdownValue = REFRESH_INTERVAL;

    // A2S result cache: key = "ip:port", value = { players, max_players, latency_ms, ts }
    const a2sCache = {};
    const A2S_CACHE_TTL = 30000; // 30s

    // ── Helpers ──────────────────────────────────────────────

    /** "2026-07-18 13:22:33" */
    function formatTime(ts) {
        const d = new Date(ts * 1000);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
             + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /** seconds → "14m 46s" or "0s" */
    function formatDuration(sec) {
        if (sec < 0) return '—';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m > 0) return `${m}m ${s}s`;
        return `${s}s`;
    }

    /** Map phase string → css class suffix */
    function phaseClass(phase) {
        const m = {
            '回合中':   'round',
            '核弹倒计时': 'nuke',
            '准备阶段':  'ready',
            '空闲':     'idle',
        };
        return m[phase] || 'unknown';
    }

    function phaseBadgeClass(phase) {
        return 'badge-' + phaseClass(phase);
    }

    // ── Background ──────────────────────────────────────────

    async function loadBackground() {
        try {
            const isMobile = window.innerWidth <= 700;
            const api = isMobile
                ? 'https://api.yppp.net/pe.php?return=json'   // portrait for phones
                : 'https://api.yppp.net/pc.php?return=json';  // landscape for desktop
            const resp = await fetch(api);
            const data = await resp.json();
            if (data.acgurl) {
                $bgLayer.style.backgroundImage = `url(${data.acgurl})`;
            }
        } catch (err) {
            console.warn('Background load failed:', err.message);
        }
    }

    // ── Server Data ─────────────────────────────────────────

    async function loadServers() {
        try {
            const resp = await fetch(STAT_API);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (!data.servers || !Array.isArray(data.servers)) {
                throw new Error('Unexpected data format');
            }
            return data;
        } catch (err) {
            console.error('Server status fetch failed:', err.message);
            throw err;
        }
    }

    // ── A2S Query (via Cloudflare Function proxy) ───────────

    /** Measure real latency from browser to game server (TCP handshake RTT) */
    async function pingServer(ip, port) {
        const start = performance.now();
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 3000);
        try {
            await fetch(`http://${ip}:${port}/`, {
                mode: 'no-cors',
                signal: ctrl.signal,
            });
        } catch (_) {
            // Expected — game server won't speak HTTP, but TCP handshake already happened
        }
        clearTimeout(timer);
        return Math.round(performance.now() - start);
    }

    async function queryA2S(ip, port) {
        const key = `${ip}:${port}`;
        const cached = a2sCache[key];
        if (cached && (Date.now() - cached.ts) < A2S_CACHE_TTL) {
            return cached;
        }
        try {
            const resp = await fetch(`/api/a2s?ip=${encodeURIComponent(ip)}&port=${port}`);
            const data = await resp.json();
            const result = { ...data, ts: Date.now() };
            a2sCache[key] = result;
            return result;
        } catch (err) {
            const result = { error: err.message, ts: Date.now() };
            a2sCache[key] = result;
            return result;
        }
    }

    function updateA2SRow(row, data) {
        const cells = row.querySelectorAll('.a2s-value');
        if (cells.length < 2) return;
        const playersEl = cells[0];
        const latencyEl = cells[1];

        if (data.error) {
            playersEl.className = 'a2s-value a2s-error';
            playersEl.textContent = 'N/A';
            latencyEl.className = 'a2s-value a2s-error';
            latencyEl.textContent = 'N/A';
            return;
        }

        // Players
        playersEl.className = 'a2s-value';
        playersEl.textContent = `${data.players}/${data.max_players}`;

        // Latency with color
        const ms = data.latency_ms;
        latencyEl.textContent = `${ms}ms`;
        latencyEl.className = 'a2s-value';
        if (ms < 60)       latencyEl.classList.add('a2s-latency-good');
        else if (ms < 120) latencyEl.classList.add('a2s-latency-ok');
        else               latencyEl.classList.add('a2s-latency-bad');
    }

    async function queryAllA2S() {
        const rows = document.querySelectorAll('.a2s-row');
        for (const row of rows) {
            const addr = row.getAttribute('data-addr');
            if (!addr) continue;
            const [ip, portStr] = addr.split(':');
            const port = parseInt(portStr, 10);
            if (!ip || !port) continue;

            // Fetch player count from API
            const data = await queryA2S(ip, port);
            updateA2SRow(row, data);

            // Override latency with real local ping (fire-and-forget per server)
            if (!data.error) {
                pingServer(ip, port).then(ms => {
                    const cells = row.querySelectorAll('.a2s-value');
                    if (cells.length < 2) return;
                    const latencyEl = cells[1];
                    latencyEl.textContent = `${ms}ms`;
                    latencyEl.className = 'a2s-value';
                    if (ms < 60)       latencyEl.classList.add('a2s-latency-good');
                    else if (ms < 120) latencyEl.classList.add('a2s-latency-ok');
                    else               latencyEl.classList.add('a2s-latency-bad');
                });
            }
        }
    }

    // ── Render ──────────────────────────────────────────────

    function render(data) {
        const servers = data.servers.filter(s => !s.server_name.includes('兑换服'));

        // Fixed sort: ①②③④⑤⑥ first (附属 right after its number), then test servers
        servers.sort((a, b) => {
            const numMap = { '①':1,'②':2,'③':3,'④':4,'⑤':5,'⑥':6 };
            const getKey = (name) => {
                const isTest = /白菜|娘娘|猫娘/.test(name);
                const isSub  = name.includes('(附属)');
                const isNum  = /[①-⑥]/.test(name);

                // Priority: 0=numbered, 2=test, 3=fallback
                let priority;
                if (isTest)       priority = 2;
                else if (isNum)   priority = 0;
                else              priority = 3;

                // Numeric order (①→1 … ⑥→6, others 99)
                let num = 99;
                for (const [ch, val] of Object.entries(numMap)) {
                    if (name.includes(ch)) { num = val; break; }
                }

                // Sub-order: main=0, 附属=1 right after; test: 白菜/娘娘/猫娘
                let sub = 99;
                if (isSub)                    sub = 1;
                else if (/白菜/.test(name))   sub = 0;
                else if (/娘娘/.test(name))   sub = 1;
                else if (/猫娘/.test(name))   sub = 2;
                else                          sub = 0;

                return priority * 10000 + num * 100 + sub;
            };
            return getKey(a.server_name) - getKey(b.server_name);
        });

        const now = Math.floor(Date.now() / 1000);

        // Status bar
        const total   = servers.length;
        const online  = servers.filter(s => s.round_phase !== '空闲').length;
        const idle    = total - online;

        $statusBar.style.display = '';
        $statusBar.innerHTML = `
            <span><span class="dot online"></span> 运行中: <strong>${online}</strong></span>
            <span><span class="dot idle"></span> 空闲: <strong>${idle}</strong></span>
            <span>总计: <strong>${total}</strong> 台</span>
            <span>页面时间: <strong>${formatTime(now)}</strong></span>
        `;

        // Cards
        let html = '';
        for (const s of servers) {
            const pc = phaseClass(s.round_phase);
            const bc = phaseBadgeClass(s.round_phase);

            html += `
            <div class="card phase-${pc}">
                <div class="name">${escapeHtml(s.server_name)}</div>
                <div class="addr">${escapeHtml(s.ip)}:${s.port}</div>
                <div class="info-row">
                    <div>
                        <div class="label">剩余回合</div>
                        <div class="value">${s.rounds_left >= 0 ? s.rounds_left : '—'}</div>
                    </div>
                    <div>
                        <div class="label">回合时间</div>
                        <div class="value">${formatDuration(s.round_time_left)}</div>
                    </div>
                </div>
                <div class="info-row a2s-row" data-addr="${escapeHtml(s.ip)}:${escapeHtml(String(s.port))}">
                    <div>
                        <div class="label">玩家</div>
                        <div class="a2s-value a2s-loading">…</div>
                    </div>
                    <div>
                        <div class="label">延迟</div>
                        <div class="a2s-value a2s-loading">…</div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="phase-badge ${bc}">${escapeHtml(s.round_phase)}</span>
                </div>
                <div class="time-info">
                    <span>更新于 ${formatTime(now)}</span>
                </div>
            </div>`;
        }

        $grid.innerHTML = html;
        // Ensure DOM is painted before querying A2S
        setTimeout(() => queryAllA2S(), 50);
    }

    function renderError(err) {
        $statusBar.innerHTML = '';
        $statusBar.style.display = 'none';
        $grid.innerHTML = `
            <div class="error-box" style="grid-column: 1 / -1;">
                <h3>⚠ 获取服务器状态失败</h3>
                <p>${escapeHtml(err.message)}</p>
                <p style="margin-top:8px;font-size:0.75rem;">
                    将在 <span id="retryCountdown">${countdownValue}</span> 秒后重试
                </p>
            </div>`;
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── Refresh Loop ────────────────────────────────────────

    function startCountdown() {
        countdownValue = REFRESH_INTERVAL;
        if ($countdown) $countdown.textContent = countdownValue;

        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            countdownValue--;
            if (countdownValue <= 0) countdownValue = REFRESH_INTERVAL;
            if ($countdown) $countdown.textContent = countdownValue;
            // Also update error page retry countdown if visible
            const retry = document.getElementById('retryCountdown');
            if (retry) retry.textContent = countdownValue;
        }, 1000);
    }

    async function refresh() {
        try {
            const data = await loadServers();
            render(data);
        } catch (err) {
            renderError(err);
        }
        startCountdown();
    }

    // ── Init ────────────────────────────────────────────────

    async function init() {
        loadBackground();  // non-blocking, errors are non-fatal
        await refresh();

        // Set up auto-refresh
        refreshTimer = setInterval(refresh, REFRESH_INTERVAL * 1000);
    }

    init();
})();
</script>

</body>
</html>
