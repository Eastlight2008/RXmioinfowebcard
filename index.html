<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo RXBreach Mio服 — 服务器状态</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #e8e8e8;
            --text-secondary: #a0a0b0;
            --accent: #6ec6ff;
            --radius: 18px;
            --blur-amount: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background: #0a0a14;
        }

        /* ── Background Layer ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(12px) brightness(0.35);
            transform: scale(1.05);
        }
        .bg-placeholder {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1030 30%, #0d1b2a 60%, #0a0a14 100%);
        }

        /* ── Header ── */
        .header {
            margin-top: 40px;
            margin-bottom: 12px;
            text-align: center;
            padding: 24px 48px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #c0d8ff, #8eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .header .refresh-info {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #707088;
        }
        .header .refresh-info span {
            color: var(--accent);
            font-weight: 600;
        }

        /* ── Status Bar ── */
        .status-bar {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: 14px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .status-bar strong {
            color: var(--text);
        }
        .status-bar .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }
        .dot.warn {
            background: #ff9800;
            box-shadow: 0 0 8px #ff9800;
        }
        .dot.idle {
            background: #9e9e9e;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            padding: 10px 24px 40px;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 20px 22px;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .card.phase-round::before    { background: linear-gradient(90deg, #4caf50, #81c784); }
        .card.phase-nuke::before     { background: linear-gradient(90deg, #f44336, #e57373); }
        .card.phase-ready::before    { background: linear-gradient(90deg, #ff9800, #ffb74d); }
        .card.phase-idle::before     { background: linear-gradient(90deg, #757575, #9e9e9e); }
        .card.phase-unknown::before  { background: linear-gradient(90deg, #607d8b, #90a4ae); }
        .card.phase-offline::before { background: linear-gradient(90deg, #ff9800, #ffb74d); }

        .card .name {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
            padding-top: 4px;
        }
        .card .addr {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 10px;
            border-radius: 8px;
            word-break: break-all;
        }
        .card .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .card .info-row > div:first-child {
            flex: 0 0 auto;
        }
        .card .info-row > div:last-child {
            flex: 0 0 auto;
            text-align: right;
            margin-left: auto;
        }
        .card .label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .card .value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .card .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .badge-round  { background: rgba(76,  175, 80,  0.2);  color: #81c784; }
        .badge-nuke   { background: rgba(244, 67,  54,  0.2);  color: #e57373; }
        .badge-ready  { background: rgba(255, 152, 0,   0.2);  color: #ffb74d; }
        .badge-idle   { background: rgba(158, 158, 158, 0.2);  color: #bdbdbd; }
        .badge-unknown{ background: rgba(96,  125, 139, 0.2);  color: #90a4ae; }
        .badge-offline{ background: rgba(255, 152, 0,   0.25); color: #ffb74d; }

        .card .a2s-row {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 10px;
            margin-top: 2px;
        }
        .card .a2s-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .card .a2s-loading {
            color: #707088;
            font-size: 0.8rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .card .a2s-error {
            color: #e57373;
            font-size: 0.75rem;
        }
        .card .a2s-offline {
            color: #ff9800;
            font-size: 0.85rem;
        }
        .card .a2s-join-btn {
            display: inline-block;
            padding: 5px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #1a6b3c, #2a8f4e);
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }
        .card .a2s-join-btn:hover {
            background: linear-gradient(135deg, #218a4c, #34a85e);
            transform: scale(1.04);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        .card .time-info {
            font-size: 0.72rem;
            color: #606078;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Loading / Error ── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            margin: 60px auto;
            background: rgba(244, 67, 54, 0.12);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: var(--radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
        }
        .error-box h3 {
            color: #e57373;
            margin-bottom: 8px;
        }
        .error-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer {
            padding: 16px;
            font-size: 0.7rem;
            color: #505068;
            text-align: center;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .header {
                margin-top: 20px;
                padding: 18px 24px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 8px 12px 30px;
            }
            .status-bar {
                gap: 12px;
                padding: 10px 18px;
                font-size: 0.75rem;
            }
        }
        @media (max-width: 480px) {
            .header {
                margin-top: 12px;
                padding: 14px 16px;
                border-radius: 12px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .header .subtitle {
                font-size: 0.75rem;
            }
            .card {
                padding: 14px 16px;
                gap: 8px;
                border-radius: 14px;
            }
            .card .name {
                font-size: 0.85rem;
            }
            .card .value {
                font-size: 1rem;
            }
            .status-bar {
                gap: 6px;
                padding: 8px 12px;
                font-size: 0.7rem;
                border-radius: 10px;
            }
            .grid {
                gap: 10px;
                padding: 6px 8px 24px;
            }
        }
    </style>
</head>
<body>

<div class="bg-placeholder"></div>
<div class="bg-layer" id="bgLayer"></div>

<div class="header">
    <h1>Neo RXBreach Mio服</h1>
    <div class="subtitle">mio 服集群 — 实时服务器状态</div>
    <div class="refresh-info">
        自动刷新: <span id="countdown">10</span>s
    </div>
</div>

<div class="status-bar" id="statusBar">
    <div class="loading">
        <div class="spinner"></div>
        <span style="color:#a0a0b0">正在获取服务器数据...</span>
    </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
    Powered by <a href="https://dp.nigigasaki.live/status.php" target="_blank" rel="noopener">dp.nigigasaki.live</a>
    &nbsp;·&nbsp;
    Background by <a href="https://api.yppp.net/api.php" target="_blank" rel="noopener">yppp.net</a>
</div>

<script>
(function () {
    'use strict';

    const STAT_API = 'https://dp.nigigasaki.live/status.php';
    const REFRESH_INTERVAL = 10; // seconds

    const $bgLayer   = document.getElementById('bgLayer');
    const $statusBar = document.getElementById('statusBar');
    const $grid      = document.getElementById('grid');
    const $countdown = document.getElementById('countdown');

    let countdownTimer = null;
    let countdownValue = REFRESH_INTERVAL;
    let _busy = false;

    // ── Helpers ──────────────────────────────────────────────

    /** "2026-07-18 13:22:33" */
    function formatTime(ts) {
        const d = new Date(ts * 1000);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
             + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /** seconds → "14m 46s" or "0s" */
    function formatDuration(sec) {
        if (sec < 0) return '—';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m > 0) return `${m}m ${s}s`;
        return `${s}s`;
    }

    /** Map phase string → css class suffix */
    function phaseClass(phase) {
        const m = {
            '回合中':   'round',
            '核弹倒计时': 'nuke',
            '准备阶段':  'ready',
            '空闲':     'idle',
        };
        return m[phase] || 'unknown';
    }

    function phaseBadgeClass(phase) {
        return 'badge-' + phaseClass(phase);
    }

    // ── Background ──────────────────────────────────────────

    async function loadBackground() {
        try {
            const isMobile = window.innerWidth <= 700;
            const api = isMobile
                ? 'https://api.yppp.net/pe.php?return=json'   // portrait for phones
                : 'https://api.yppp.net/pc.php?return=json';  // landscape for desktop
            const resp = await fetch(api);
            const data = await resp.json();
            if (data.acgurl) {
                $bgLayer.style.backgroundImage = `url(${data.acgurl})`;
            }
        } catch (err) {
            console.warn('Background load failed:', err.message);
        }
    }

    // ── Server Data (merged from status.php + uapis.cn) ────

    const UAPI_URL = 'https://uapis.cn/api/v1/game/steam/servers?appid=4000&name=Neo%20RXBreach&limit=30';

    /**
     * Fetch both status.php and uapis.cn, merge into unified server list.
     * uapis.cn is the source of truth for which servers exist (catches restarts).
     * status.php provides round details for active servers.
     */
    function fetchTimeout(url, ms) {
        const ctrl = new AbortController();
        const id = setTimeout(() => ctrl.abort(), ms);
        return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
    }

    async function loadMergedServers() {
        const [sRes, uRes] = await Promise.allSettled([
            fetch(STAT_API).then(r => r.ok ? r.json() : Promise.reject()),
            fetchTimeout(UAPI_URL, 8000).then(r => r.ok ? r.json() : Promise.reject()),
        ]);

        const statusServers = sRes.status === 'fulfilled' ? (sRes.value.servers || []) : [];
        const uapiServers   = uRes.status === 'fulfilled' ? (uRes.value.servers || []) : [];

        // Index status.php by IP:port for quick lookup
        const sMap = {};
        for (const s of statusServers) {
            if (s.server_name.includes('兑换服')) continue;
            sMap[`${s.ip}:${s.port}`] = s;
        }

        const seen = new Set();
        const list = [];

        // Pass 1: uapis.cn servers (mio only) — include restarting ones missing from status.php
        for (const u of uapiServers) {
            if (!u.name || !/mio/i.test(u.name) || /n!n|兑换服/i.test(u.name)) continue;
            const key = `${u.ip}:${u.port}`;
            if (seen.has(key)) continue;
            seen.add(key);
            const st = sMap[key];
            list.push({
                server_name:     u.name,
                ip:              u.ip,
                port:            u.port,
                players:         u.players ?? 0,
                max_players:     u.max_players ?? 0,
                rounds_left:     st ? st.rounds_left     : '—',
                round_time_left: st ? st.round_time_left : '—',
                round_phase:     st ? st.round_phase     : '重启/离线中',
            });
        }

        // Pass 2: status.php servers not already covered
        for (const s of statusServers) {
            if (s.server_name.includes('兑换服')) continue;
            const key = `${s.ip}:${s.port}`;
            if (seen.has(key)) continue;
            seen.add(key);
            list.push({ ...s, players: null, max_players: null });
        }

        return list;
    }

    // ── Render ──────────────────────────────────────────────

    function render(servers) {
        // Fixed sort: ①②③④⑤⑥ first (附属 right after its number), then test servers
        servers.sort((a, b) => {
            const numMap = { '①':1,'②':2,'③':3,'④':4,'⑤':5,'⑥':6 };
            const getKey = (name) => {
                const isTest = /白菜|娘娘|猫娘/.test(name);
                const isSub  = name.includes('(附属)');
                const isNum  = /[①-⑥]/.test(name);

                // Priority: 0=numbered, 2=test, 3=fallback
                let priority;
                if (isTest)       priority = 2;
                else if (isNum)   priority = 0;
                else              priority = 3;

                // Numeric order (①→1 … ⑥→6, others 99)
                let num = 99;
                for (const [ch, val] of Object.entries(numMap)) {
                    if (name.includes(ch)) { num = val; break; }
                }

                // Sub-order: main=0, 附属=1 right after; test: 白菜/娘娘/猫娘
                let sub = 99;
                if (isSub)                    sub = 1;
                else if (/白菜/.test(name))   sub = 0;
                else if (/娘娘/.test(name))   sub = 1;
                else if (/猫娘/.test(name))   sub = 2;
                else                          sub = 0;

                return priority * 10000 + num * 100 + sub;
            };
            return getKey(a.server_name) - getKey(b.server_name);
        });

        const now = Math.floor(Date.now() / 1000);

        // Status bar
        const total    = servers.length;
        const running  = servers.filter(s => s.round_phase !== '空闲' && s.round_phase !== '重启/离线中').length;
        const offline  = servers.filter(s => s.round_phase === '空闲' || s.round_phase === '重启/离线中').length;

        $statusBar.style.display = '';
        $statusBar.innerHTML = `
            <span><span class="dot online"></span> 运行中: <strong>${running}</strong></span>
            <span><span class="dot warn"></span> 离线: <strong>${offline}</strong></span>
            <span>总计: <strong>${total}</strong> 台</span>
            <span>页面时间: <strong>${formatTime(now)}</strong></span>
        `;

        // Cards
        let html = '';
        for (const s of servers) {
            const isOff   = s.round_phase === '空闲' || s.round_phase === '重启/离线中';
            const pc      = isOff ? 'offline' : phaseClass(s.round_phase);
            const bc      = isOff ? 'badge-offline' : phaseBadgeClass(s.round_phase);
            const phaseText = isOff ? '离线/重启中' : s.round_phase;
            const playersText = (s.players != null) ? `${s.players}/${s.max_players}` : '…';
            const playersCls  = (s.players != null) ? 'a2s-value' : 'a2s-value a2s-loading';

            html += `
            <div class="card phase-${pc}">
                <div class="name">${escapeHtml(s.server_name)}</div>
                <div class="addr">${escapeHtml(s.ip)}:${s.port}</div>
                <div class="info-row">
                    <div>
                        <div class="label">剩余回合</div>
                        <div class="value">${s.rounds_left >= 0 ? s.rounds_left : '—'}</div>
                    </div>
                    <div>
                        <div class="label">回合时间</div>
                        <div class="value">${formatDuration(s.round_time_left)}</div>
                    </div>
                </div>
                <div class="info-row">
                    <div>
                        <div class="label">玩家</div>
                        <div class="${playersCls}">${playersText}</div>
                    </div>
                    <div>
                        <a class="a2s-join-btn" href="steam://connect/${escapeHtml(s.ip)}:${s.port}">加入</a>
                    </div>
                </div>
                <div class="info-row">
                    <span class="phase-badge ${bc}">${escapeHtml(phaseText)}</span>
                </div>
                <div class="time-info">
                    <span>更新于 ${formatTime(now)}</span>
                </div>
            </div>`;
        }

        $grid.innerHTML = html;
    }

    function renderError(err) {
        $statusBar.innerHTML = '';
        $statusBar.style.display = 'none';
        $grid.innerHTML = `
            <div class="error-box" style="grid-column: 1 / -1;">
                <h3>⚠ 获取服务器状态失败</h3>
                <p>${escapeHtml(err.message)}</p>
                <p style="margin-top:8px;font-size:0.75rem;">
                    将在 <span id="retryCountdown">${countdownValue}</span> 秒后重试
                </p>
            </div>`;
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── Refresh Loop ────────────────────────────────────────

    function startCountdown() {
        countdownValue = REFRESH_INTERVAL;
        if ($countdown) $countdown.textContent = countdownValue;
        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            countdownValue--;
            if (countdownValue <= 0) countdownValue = REFRESH_INTERVAL;
            if ($countdown) $countdown.textContent = countdownValue;
            const retry = document.getElementById('retryCountdown');
            if (retry) retry.textContent = countdownValue;
        }, 1000);
    }

    async function refresh() {
        if (_busy) return;
        _busy = true;
        try {
            const servers = await loadMergedServers();
            if (servers.length === 0) throw new Error('No servers found');
            render(servers);
        } catch (err) {
            renderError(err);
        } finally {
            _busy = false;
            startCountdown();
        }
    }

    // ── Init ────────────────────────────────────────────────

    async function init() {
        loadBackground();
        await refresh();
        setInterval(refresh, REFRESH_INTERVAL * 1000);
    }

    init();
})();
</script>

</body>
</html>
